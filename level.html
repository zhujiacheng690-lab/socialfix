<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>关卡 · Socialfix</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#08081a;
  --primary:#7c3aed; --primary-2:#ec4899;
  --good:#06d6a0; --bad:#ef4444; --key:#ffd60a; --info:#38bdf8;
  --text:#f5f5ff; --text-2:#c7c7e0; --text-3:#8b8bb0;
  --border:rgba(255,255,255,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg-0);color:var(--text);font-family:'Inter','Noto Sans SC',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}

.bg{position:fixed;inset:0;z-index:-2;background:
  radial-gradient(900px 600px at 15% 15%, var(--tint1,rgba(124,58,237,.25)), transparent 60%),
  radial-gradient(900px 600px at 85% 85%, var(--tint2,rgba(236,72,153,.20)), transparent 60%),
  linear-gradient(180deg,#08081a,#03030c);}
.orbs{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.4;animation:float 22s ease-in-out infinite}
.orb.o1{width:520px;height:520px;background:radial-gradient(circle,var(--primary),transparent 65%);top:-140px;left:-120px}
.orb.o2{width:460px;height:460px;background:radial-gradient(circle,var(--primary-2),transparent 65%);top:34%;right:-160px;animation-delay:-8s}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-30px) scale(1.08)}}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:18px 40px;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(24px);background:rgba(8,8,26,.6);border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px;font-weight:900;font-size:18px;letter-spacing:-.02em;text-decoration:none;color:inherit}
.logo-dot{width:12px;height:12px;background:linear-gradient(135deg,var(--primary),var(--primary-2));border-radius:50%;box-shadow:0 0 20px rgba(236,72,153,.7)}
.nav-links{display:flex;gap:20px;align-items:center;font-size:14px}
.nav-links a{color:var(--text-2);text-decoration:none;transition:.2s}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text-3);text-decoration:none}
.back-link:hover{color:#fff}
.nav-cta{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff!important;padding:8px 18px;border-radius:999px;font-weight:700}

.wrap{max-width:860px;margin:0 auto;padding:120px 24px 60px;position:relative}

.meta{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:.05em;backdrop-filter:blur(10px)}
.badge-cat{background:rgba(124,58,237,.15);color:#c7a8ff;border:1px solid rgba(124,58,237,.3)}
.badge-lv{background:rgba(255,214,10,.12);color:var(--key);border:1px solid rgba(255,214,10,.3)}
.badge-diff{background:rgba(255,255,255,.05);color:var(--text-2);border:1px solid var(--border)}

h1{font-size:clamp(38px,6vw,68px);font-weight:900;letter-spacing:-.03em;line-height:1.05;margin-bottom:14px;background:linear-gradient(135deg,#fff 20%,var(--primary-2) 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.card{background:linear-gradient(160deg,rgba(255,255,255,.05),rgba(255,255,255,.01));border:1px solid var(--border);border-radius:24px;padding:32px;margin-bottom:22px;position:relative;overflow:hidden;backdrop-filter:blur(20px)}
.card::before{content:"";position:absolute;top:-40%;right:-40%;width:70%;height:70%;filter:blur(50px);opacity:.25;pointer-events:none}
.card > *{position:relative;z-index:1}
.card-head{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.card-icon{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:22px;flex-shrink:0;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card h3{font-size:22px;font-weight:900;letter-spacing:-.02em}
.card-desc{font-size:12px;color:var(--text-3);margin-top:2px;letter-spacing:.05em}

.scenario .card-icon{background:linear-gradient(135deg,var(--info),var(--primary))}
.scenario::before{background:radial-gradient(circle,var(--info),transparent 65%)}
.scenario-text{font-size:17px;line-height:1.85;color:var(--text);padding:22px 24px;background:rgba(56,189,248,.06);border-left:3px solid var(--info);border-radius:0 14px 14px 0}
.scenario-quote{margin-top:16px;font-size:16px;line-height:1.75;color:var(--primary-2);font-style:italic;padding-left:12px;border-left:2px dashed rgba(236,72,153,.4)}

.solution .card-icon{background:linear-gradient(135deg,var(--good),var(--info))}
.solution::before{background:radial-gradient(circle,var(--good),transparent 65%)}
.solution-intro{padding:18px 22px;background:rgba(6,214,160,.06);border:1px solid rgba(6,214,160,.15);border-radius:14px;margin-bottom:20px;font-size:14.5px;line-height:1.85;color:var(--text-2)}
.solution-intro b{color:#a3f5cf;font-weight:700}
.steps{display:flex;flex-direction:column;gap:14px}
.step{display:flex;gap:16px;padding:18px 20px;background:rgba(6,214,160,.05);border:1px solid rgba(6,214,160,.15);border-radius:14px;transition:.2s}
.step:hover{border-color:rgba(6,214,160,.35);transform:translateX(4px)}
.step-num{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--good),var(--info));color:#0a0a1f;font-weight:900;font-size:15px;display:grid;place-items:center;flex-shrink:0;box-shadow:0 4px 12px rgba(6,214,160,.3)}
.step-body h5{font-size:16px;font-weight:800;margin-bottom:8px;letter-spacing:-.01em}
.step-body p{font-size:14px;color:var(--text-2);line-height:1.85}
.step-body p b{color:#fff;font-weight:700}

.wrong .card-icon{background:linear-gradient(135deg,var(--bad),#f97316)}
.wrong::before{background:radial-gradient(circle,var(--bad),transparent 65%)}
.wrongs{display:flex;flex-direction:column;gap:12px}
.wrong-item{display:flex;gap:14px;padding:16px 18px;background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.15);border-radius:14px;align-items:flex-start}
.wrong-x{color:var(--bad);font-weight:900;font-size:20px;line-height:1;flex-shrink:0;margin-top:2px}
.wrong-item-body{flex:1}
.wrong-quote{font-size:15px;color:var(--text);margin-bottom:6px;font-weight:700}
.wrong-why{font-size:13px;color:var(--text-3);line-height:1.65}

.keys .card-icon{background:linear-gradient(135deg,var(--key),var(--primary-2));color:#0a0a1f}
.keys::before{background:radial-gradient(circle,var(--key),transparent 65%)}
.key-list{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.key{padding:20px 14px;background:linear-gradient(160deg,rgba(255,214,10,.10),rgba(236,72,153,.06));border:1px solid rgba(255,214,10,.25);border-radius:16px;text-align:center;transition:.25s}
.key:hover{transform:translateY(-3px);border-color:rgba(255,214,10,.5)}
.key-emo{font-size:26px;margin-bottom:8px;filter:drop-shadow(0 2px 8px rgba(255,214,10,.4))}
.key-txt{font-size:13.5px;font-weight:800;color:#fff;line-height:1.4}

.actions{display:flex;gap:12px;justify-content:space-between;margin-top:34px;flex-wrap:wrap}
.btn{padding:15px 24px;border-radius:14px;font-size:14px;font-weight:800;text-decoration:none;transition:.25s;display:inline-flex;align-items:center;gap:8px;cursor:pointer;border:none;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;box-shadow:0 12px 32px rgba(124,58,237,.4)}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 18px 40px rgba(124,58,237,.55)}
.btn-ghost{background:rgba(255,255,255,.05);color:var(--text-2);border:1px solid var(--border);backdrop-filter:blur(10px)}
.btn-ghost:hover{background:rgba(255,255,255,.1);color:#fff}

.train-strip{margin-top:30px;padding:22px 26px;border-radius:20px;background:linear-gradient(135deg,rgba(255,214,10,.10),rgba(236,72,153,.10));border:1px solid rgba(255,214,10,.2);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.train-strip-txt h4{font-size:16px;font-weight:800;margin-bottom:2px}
.train-strip-txt p{font-size:12px;color:var(--text-3)}
.train-strip a{padding:10px 20px;background:linear-gradient(135deg,var(--primary),var(--primary-2));border-radius:999px;color:#fff;text-decoration:none;font-weight:800;font-size:13px;white-space:nowrap}

@media (max-width:700px){
  .wrap{padding:100px 16px 40px}
  .card{padding:22px}
  .key-list{grid-template-columns:1fr}
  nav{padding:14px 16px}
  .nav-links a:not(.back-link):not(.nav-cta){display:none}
  h1{font-size:32px}
}
</style>
<link rel="stylesheet" href="practice.css">
</head>
<body>
<div class="bg" id="bg"></div>
<div class="orbs">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
</div>

<nav>
  <a class="logo" href="index.html"><span class="logo-dot"></span>Socialfix</a>
  <div class="nav-links">
    <a class="back-link" id="backLink" href="index.html">← 回到分类</a>

<div class="wrap">
  <div class="meta">

  <div class="card scenario">

      </div>

    <div class="key-list" id="keys"></div>
  </div>

  <div class="actions">
    <a class="btn btn-ghost" id="backBtn" href="index.html">← 回到关卡地图</a>
    <a class="btn btn-primary" id="nextBtn" href="#">下一关 →</a>
  </div>

  <div class="train-strip">
    <div class="train-strip-txt">
      <h4>练完这关，去训练场再抽一个？</h4>
      <p>不看分、不打卡，就是纯练手。</p>
    </div>
    <a href="simulator.html">🎯 进入训练场</a>
  </div>
</div>

<section class="practice">
  <div class="container">
    <span class="eyebrow">Practice Quiz</span>
    <h2 class="sec-title">练手：两道相关的选择题</h2>
    <p class="practice-intro">和这一关直接对应，选一个答案，看看真实场景里会发生什么——<b>没有对错，只有反馈</b>。</p>
    <div class="quiz-list" id="quizList"></div>
  </div>
</section>

<script>
const CATS = {
  study:  { name:'学习场景', color1:'#38bdf8', color2:'#7c3aed', tint1:'rgba(56,189,248,.25)',  tint2:'rgba(124,58,237,.20)',  back:'category-study.html'  },
  family: { name:'家庭场景', color1:'#ec4899', color2:'#f97316', tint1:'rgba(236,72,153,.25)',  tint2:'rgba(249,115,22,.20)',  back:'category-family.html' },
  life:   { name:'生活场景', color1:'#06d6a0', color2:'#ffd60a', tint1:'rgba(6,214,160,.22)',   tint2:'rgba(255,214,10,.18)',  back:'category-life.html'   },
};

const LEVELS = {
  "study": {
    "1": {
      "title": "被老师当众批评",
      "diff": "☆ 入门",
      "scenario": "上课时你走神了，老师突然点你名字，让你回答一个你没听到的问题。全班都在看你，老师语气有点火。",
      "quote": "「你上课到底有没有听？站起来！」",
      "intro": "被点名的那几秒，脑子会一片空白，这很正常。真正让老师转过来\"和你站在一起\"的，从来不是完美的回答，而是\u003cb>你愿意面对\u003c/b>的态度。承认+补救+回应，这三步走完，你会发现老师其实很好说话。",
      "steps": [
        {
          "h": "先承认，不辩解",
          "p": "直接说「对不起老师，我刚才没跟上」。承认自己走神并不丢人，反而\u003cb>是最快让老师放下火气\u003c/b>的方式。老师最介意的从来不是学生走神，而是被顶嘴。承认那一刻，你已经赢下了这次冲突的一半。"
        },
        {
          "h": "给出一个可操作的补救",
          "p": "接一句「能不能麻烦您再说一次问题？我现在认真想」。让老师看到你\u003cb>想解决\u003c/b>，而不是想开脱。这一句在老师耳朵里是\"这孩子还想学\"，气自然就消了。你只是需要一个继续参与的入口，不是完美的答案。"
        },
        {
          "h": "下课再补一句谢谢",
          "p": "课后走到讲台边说「老师上课那样不好意思，下次我会跟上」。\u003cb>一句真诚的道歉，比在群里发一堆解释有用一百倍\u003c/b>。而且你会发现，主动这一步之后，老师之后看你的眼神都会不一样。"
        }
      ],
      "wrongs": [
        {
          "q": "「我没走神，我在想问题。」",
          "w": "当场撒谎，老师一眼看穿，反而会更火。"
        },
        {
          "q": "「你为什么不点别人？」",
          "w": "把火拉到对抗上，从\"没听讲\"变成\"顶撞老师\"。"
        },
        {
          "q": "低头一言不发",
          "w": "沉默会被解读为无所谓，老师往往会继续追问。"
        }
      ],
      "keys": [
        {
          "e": "🙏",
          "t": "承认在辩解之前"
        },
        {
          "e": "🛠",
          "t": "给一句补救的话"
        },
        {
          "e": "⏱",
          "t": "课后一句话收尾"
        }
      ]
    },
    "2": {
      "title": "同学想借你作业",
      "diff": "☆ 入门",
      "scenario": "关系一般的同学在早读前凑过来，把你的作业本抽走一半，说要抄一下。你不好意思拒绝，也不想被拉下水。",
      "quote": "「借我抄一下，就这一次，快！」",
      "intro": "能对同学说\"不\"，是一件\u003cb>值得练习的事\u003c/b>，因为它保护的是你自己。你可以既拒绝他的请求，又不伤害你们的关系——诀窍是：\u003cb>拒的是事，不是人\u003c/b>。同学听到的不是\"你不帮我\"，而是\"你在替我着想\"。",
      "steps": [
        {
          "h": "先给对方一个台阶",
          "p": "一句「你昨晚是不是又忙别的了」——先\u003cb>承认他的处境\u003c/b>，让他不觉得你在教训他。这一句会让接下来的拒绝显得温柔很多，因为你先站到了他那一边。"
        },
        {
          "h": "用\"我\"说清楚边界",
          "p": "接着说「这次不行，上次被老师抓过一次，我不想再冒险」。用\u003cb>\"我\"的理由\u003c/b>，不评判他。他会理解——你不是不愿意帮，而是你有自己的顾虑。这不是自私，这是把自己照顾好。"
        },
        {
          "h": "给一个替代方案",
          "p": "最后一句「下课我可以给你讲思路」。\u003cb>拒绝内容，但没有拒绝关系\u003c/b>。你依然愿意为他花时间，只是换了一种更负责任的方式。这样收尾，你俩关系一点没伤，你也保住了自己。"
        }
      ],
      "wrongs": [
        {
          "q": "「你自己不会写吗？」",
          "w": "人格攻击。以后关系会僵。"
        },
        {
          "q": "「好吧……那你快点。」",
          "w": "你其实不想，他也感觉到了。憋屈还担风险。"
        },
        {
          "q": "「我没写完呢。」",
          "w": "编理由容易被拆穿，下次他还会来问。"
        }
      ],
      "keys": [
        {
          "e": "🎫",
          "t": "给对方台阶"
        },
        {
          "e": "🚧",
          "t": "用\"我\"说边界"
        },
        {
          "e": "🤝",
          "t": "拒事不拒人"
        }
      ]
    },
    "3": {
      "title": "组员一直摸鱼",
      "diff": "☆☆ 进阶",
      "scenario": "小组作业 deadline 明天，只有你一个人在做。群里发消息没人回，其中一个组员在朋友圈发了打游戏截图。",
      "quote": "「明天就交了，大家看下分工好吗」——已读五个，回复零。",
      "intro": "一个人扛小组作业的委屈，你没必要独自承担。你其实在做一件\u003cb>成年人才需要做的事\u003c/b>：为团队负责，同时不把自己搞崩。技巧不是发火、也不是硬撑，而是\u003cb>把话说到具体的一个人、具体的一件事、一个具体的时间点\u003c/b>。",
      "steps": [
        {
          "h": "点名不点火，私聊那个具体的人",
          "p": "不要在大群里泛泛地喊\"大家动一动\"——所有人都会假装没看到。私聊那个还在打游戏的：「看到你在玩，我这边差你那部分才能交，能今晚给我吗？」\u003cb>点名到人，人就会回你\u003c/b>。这不是撕破脸，这是负责。"
        },
        {
          "h": "给死线，不给情绪",
          "p": "说清「今晚 11 点前我需要拿到」，比说十遍\"你能不能有点责任心\"有用一百倍。\u003cb>具体的时间是最有力量的语言\u003c/b>——它把模糊的义务变成一个必须回应的动作。你不是在抱怨，你是在协调，语气可以很稳。"
        },
        {
          "h": "最坏预案先想好",
          "p": "和另一个愿意做事的组员商量：如果他不交，我们两个是不是先把这一块补上，事后再一起去和老师说明。\u003cb>提前准备预案，你就不会在最后一刻手忙脚乱\u003c/b>。而且这一步会让你从\"被动受害者\"变成\"主动掌控者\"——心态完全不一样。"
        }
      ],
      "wrongs": [
        {
          "q": "「你们都不做，我一个人做得了吗！」",
          "w": "情绪化群发，谁都不会主动接。"
        },
        {
          "q": "忍到最后一刻自己全写完",
          "w": "你会累到崩溃，他们下次还这样。"
        },
        {
          "q": "「行行行我做我做」",
          "w": "表面赌气，实质纵容。"
        }
      ],
      "keys": [
        {
          "e": "🎯",
          "t": "私聊具体的人"
        },
        {

function getParam(k){ return new URLSearchParams(location.search).get(k); }
const cat = getParam('cat') || 'study';
const id  = parseInt(getParam('id')||'1',10);
const catCfg = CATS[cat] || CATS.study;
const level = (LEVELS[cat] && LEVELS[cat][id]) || LEVELS.study[1];

// Wire the practice-quiz list to this level so practice.js picks it up.
(function(){
  const ql = document.getElementById('quizList');
  if(ql){ ql.dataset.cat = cat; ql.dataset.id = String(id); }
})();

document.getElementById('bg').style.setProperty('--tint1', catCfg.tint1);
document.getElementById('bg').style.setProperty('--tint2', catCfg.tint2);
document.documentElement.style.setProperty('--primary',  catCfg.color1);
document.documentElement.style.setProperty('--primary-2',catCfg.color2);

document.title = level.title + ' · Socialfix';
document.getElementById('badgeCat').textContent  = catCfg.name;
document.getElementById('badgeLv').textContent   = 'LV.' + id;
document.getElementById('badgeDiff').textContent = level.diff;
document.getElementById('title').textContent     = level.title;
document.getElementById('backLink').href = catCfg.back;
document.getElementById('backBtn').href  = catCfg.back;

document.getElementById('scenario').textContent = level.scenario;
document.getElementById('scenarioQuote').textContent = level.quote;
document.getElementById('solutionIntro').innerHTML = level.intro || '';

const stepsEl = document.getElementById('steps');
level.steps.forEach(function(s,i){
  const d=document.createElement('div'); d.className='step';
  d.innerHTML = '<div class="step-num">'+(i+1)+'</div><div class="step-body"><h5>'+s.h+'</h5><p>'+s.p+'</p></div>';
  stepsEl.appendChild(d);
});

const wrongsEl = document.getElementById('wrongs');
level.wrongs.forEach(function(w){
  const d=document.createElement('div'); d.className='wrong-item';
  d.innerHTML = '<div class="wrong-x">✕</div><div class="wrong-item-body"><div class="wrong-quote">'+w.q+'</div><div class="wrong-why">'+w.w+'</div></div>';
  wrongsEl.appendChild(d);
});

const keysEl = document.getElementById('keys');
level.keys.forEach(function(k){
  const d=document.createElement('div'); d.className='key';
  d.innerHTML = '<div class="key-emo">'+k.e+'</div><div class="key-txt">'+k.t+'</div>';
  keysEl.appendChild(d);
});

const nextBtn = document.getElementById('nextBtn');
const nextId = id + 1;
if(LEVELS[cat] && LEVELS[cat][nextId]){
  nextBtn.href = 'level.html?cat='+cat+'&id='+nextId;
  nextBtn.textContent = '下一关：' + LEVELS[cat][nextId].title + ' →';
}else{
  nextBtn.href = catCfg.back;
  nextBtn.textContent = '回到关卡地图 →';
}
